# Build and publish workflow for http_server.
# - Builds x64 Release on every push/PR targeting main.
# - Creates a GitHub Release and uploads the DLL ZIP only on pushes to main.

name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Solution file path (relative to repository root)
  SOLUTION_FILE_PATH: .\vs2019\http_server.sln
  # Build settings
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  # Expected output DLL path.
  # NOTE: The filename contains a space ("HTTP Server.dll") as set by the VS project;
  #       all usages must be quoted accordingly.
  DLL_PATH: .\vs2019\x64\Release\http_server64.dll

# Needs write access to create/delete releases and upload assets.
# No broader permissions are required.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    - name: Build x64 Release
      # Build the solution for x64 Release; output lands at vs2019\x64\Release\
      run: |
        msbuild ${{ env.SOLUTION_FILE_PATH }} `
          /m `
          /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
          /p:Platform=${{ env.BUILD_PLATFORM }} `
          /p:PlatformToolset=v145 `
          /p:UseSharedCompilation=true `
          /p:RunCodeAnalysis=false `
          /p:BuildInParallel=true `
          /p:DebugType=None `
          /p:Optimize=true

    # ----------------------------------------------------------------
    # Steps below run only on push to main (not on pull requests)
    # vs2019\x64\Release\HTTP Server.dll
    # ----------------------------------------------------------------

    - name: Verify DLL and create ZIP artifact
      if: github.event_name == 'push'
      shell: pwsh
      run: |
        $dll = Join-Path $env:GITHUB_WORKSPACE "${{ env.DLL_PATH }}"
        if (-not (Test-Path -LiteralPath $dll)) {
            Write-Error "Expected DLL not found: $dll"
            exit 1
        }
        # Use an ISO-8601-based UTC timestamp as the release tag (filesystem/tag-safe)
        # $timestamp = (Get-Date -AsUTC).ToString("yyyyMMddTHHmmss")
        $timestamp1 = (Get-Date).AddHours(8).ToString("yyyyMMddTHHmmss")
        $timestamp = (Get-Date).ToString("yyyyMMddTHHmmss")
        Write-Host "timestamp1 $timestamp1 (timestamp: $timestamp)"
        $zipName   = "http_server-$timestamp.zip"
        # Compress-Archive -Path $dll -DestinationPath $zipName -CompressionLevel Optimal
        # 7z.exe a -tbzip2 -mx9 $zipName $dll
        7z.exe a -tzip -mx9 $zipName $dll
        Write-Output "RELEASE_TAG=$timestamp"   >> $env:GITHUB_ENV
        Write-Output "ZIP_NAME=$zipName"         >> $env:GITHUB_ENV
        Write-Host "Created $zipName (tag: $timestamp)"

    - name: Create GitHub Release and upload asset
      if: github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        # Create the release, then upload the ZIP as its asset
        gh release create "${{ env.RELEASE_TAG }}" `
          --title "${{ env.RELEASE_TAG }}" `
          --notes "Automated build from commit ${{ github.sha }}" `
          "${{ env.ZIP_NAME }}"

    - name: Retain only the 10 newest releases
      if: github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        # gh release list returns releases newest-first by default; no extra sorting needed.
        # Limit is 1000 — sufficient for the vast majority of repositories.
        # If the release count ever exceeds 1000, older releases will not be cleaned up
        # automatically and will need to be removed manually.
        $releases = gh release list --limit 1000 --json tagName,createdAt `
          | ConvertFrom-Json

        $toDelete = $releases | Select-Object -Skip 10
        foreach ($rel in $toDelete) {
          $tag = $rel.tagName
          Write-Host "Deleting release and tag: $tag"
          gh release delete $tag --yes --cleanup-tag
        }

